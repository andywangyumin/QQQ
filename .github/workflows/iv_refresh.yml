name: QQQ IV Refresh

on:
  schedule:
    - cron: '30 20 * * 1-5'   # UTC 20:30 = 美东 16:30（收盘后30分钟），yfinance 数据已刷新
  workflow_dispatch:            # 允许手动触发

jobs:
  iv-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB
        uses: actions/cache@v4
        with:
          path: logs/
          key: logs-db-${{ github.run_id }}
          restore-keys: |
            logs-db-

      - name: Download state DB artifact (cache miss fallback)
        uses: actions/download-artifact@v4
        with:
          name: state-db
          path: logs/
        continue-on-error: true

      - name: Refresh option IVs
        run: python src/iv_refresh.py

      - name: Upload state DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-db
          path: logs/state.db
          retention-days: 90
          overwrite: true
