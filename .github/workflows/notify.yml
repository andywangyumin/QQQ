name: QQQ LEAPS Monitor — Notify

on:
  schedule:
    - cron: '0 10 * * 1-5'  # UTC 10:00 = 北京时间 18:00，从 DB 读取已准备卡片 → 推送飞书
  workflow_dispatch:           # 允许手动触发

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB
        uses: actions/cache@v4
        with:
          path: logs/
          key: logs-db-${{ github.run_id }}
          restore-keys: |
            logs-db-

      - name: Download state DB artifact (contains today's prepared card)
        uses: actions/download-artifact@v4
        with:
          name: state-db-v2
          path: logs/
        continue-on-error: true

      - name: Send notification
        run: python src/main.py --notify
        env:
          LARK_WEBHOOK_URLS: ${{ secrets.LARK_WEBHOOK_URLS }}
          LARK_SECRET:       ${{ secrets.LARK_SECRET }}

      - name: Upload state DB artifact (updated with sent log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-db-v2
          path: logs/state.db
          retention-days: 90
          overwrite: true
