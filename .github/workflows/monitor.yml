name: QQQ LEAPS Monitor

on:
  schedule:
    - cron: '45 9 * * 1-5'   # UTC 09:45 = 北京时间 17:45，加上队列+安装时间约5~15分钟，预计18:00前后落地
  workflow_dispatch:           # 允许手动触发（测试用）

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Restore logs DB (state + market history)
        uses: actions/cache@v4
        with:
          path: logs/
          key: logs-db-${{ github.run_id }}
          restore-keys: |
            logs-db-

      - name: Download state DB artifact (cache miss fallback)
        uses: actions/download-artifact@v4
        with:
          name: state-db-v2
          path: logs/
        continue-on-error: true

      - name: Run monitor
        run: python src/main.py
        env:
          LARK_WEBHOOK_URLS: ${{ secrets.LARK_WEBHOOK_URLS }}
          LARK_APP_ID:       ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET:   ${{ secrets.LARK_APP_SECRET }}

      - name: Upload state DB artifact (long-term backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-db-v2
          path: logs/state.db
          retention-days: 90
          overwrite: true
